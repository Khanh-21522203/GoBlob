apiVersion: apps/v1
kind: Deployment
metadata:
  name: goblob-filer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: goblob-filer
  template:
    metadata:
      labels:
        app: goblob-filer
    spec:
      containers:
        - name: filer
          image: goblob:latest
          args: ["filer", "-ip=0.0.0.0", "-port=8888", "-grpc.port=18888", "-masters=goblob-master:9333", "-storeDir=/data/filer", "-metricsPort=9092"]
          ports:
            - containerPort: 8888
            - containerPort: 18888
            - containerPort: 9092
          volumeMounts:
            - name: data
              mountPath: /data/filer
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: goblob-filer
spec:
  selector:
    app: goblob-filer
  ports:
    - name: http
      port: 8888
      targetPort: 8888
    - name: grpc
      port: 18888
      targetPort: 18888
