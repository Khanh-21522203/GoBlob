apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-s3
spec:
  replicas: {{ .Values.s3.replicas }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-s3
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-s3
    spec:
      containers:
        - name: s3
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          args: ["s3", "-ip=0.0.0.0", "-port=8333", "-filer={{ .Release.Name }}-filer:8888"]
          ports:
            - containerPort: 8333
