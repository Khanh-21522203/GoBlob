name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Build
        run: go build ./...
      - name: Test (race)
        run: go test ./goblob/... -race -count=1 -timeout=5m
      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: ./goblob/...
