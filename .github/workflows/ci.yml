name: CI
on: [push, pull_request]
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v4
        with: { go-version: '1.21' }
      - run: go build ./...
      - run: go test ./... -race
      - uses: golangci/golangci-lint-action@v3
