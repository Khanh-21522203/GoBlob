name: Security
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

jobs:
  gosec:
    name: Gosec static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Run Gosec
        uses: securego/gosec@master
        with:
          # Excluded rules:
          #   G104 – errors from HTTP response writers (json.Encode, w.Write) are intentionally ignored
          #   G115 – integer narrowing casts in storage/protocol code are bounded by design
          #   G301/G302/G306 – directory/file permissions are intentional for shared storage layout
          #   G304 – file paths built from runtime config in storage engine (required)
          #   G401/G501 – MD5 used for S3 ETag computation per spec
          args: >-
            -exclude=G104,G115,G301,G302,G304,G306,G401,G501
            ./goblob/...

  vulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck ./goblob/...

  fuzz:
    name: JWT fuzz test (short)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Fuzz VerifyJwt
        run: go test -fuzz=FuzzVerifyJwt -fuzztime=30s ./goblob/security/
