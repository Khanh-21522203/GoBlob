name: Security
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC

jobs:
  gosec:
    name: Gosec static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Run Gosec
        uses: securego/gosec@master
        with:
          # Excluded rules:
          #   G103 – unsafe.Slice in generated protobuf code (standard protoc output)
          #   G104 – errors from HTTP response writers intentionally ignored
          #   G115 – integer narrowing casts in storage/protocol code are bounded by design
          #   G118 – context cancel functions returned to caller or goroutines using background ctx
          #   G301/G302/G306 – directory/file permissions are intentional for shared storage layout
          #   G304 – file paths built from runtime config in storage engine (required)
          #   G401/G501 – MD5 used for S3 ETag computation per spec
          #   G402 – InsecureSkipVerify in dev/test TLS fallback only
          #   G703 – path traversal taint in storage tier upload (source paths are operator-controlled)
          #   G705 – XSS taint on binary blob writes (storage server, not an HTML app)
          args: >-
            -exclude=G103,G104,G115,G118,G301,G302,G304,G306,G401,G402,G501,G703,G705
            ./goblob/...

  vulncheck:
    name: Go vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: Run govulncheck
        run: govulncheck -C goblob -scan module

  fuzz:
    name: JWT fuzz test (short)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Fuzz VerifyJwt
        run: go test -fuzz=FuzzVerifyJwt -fuzztime=30s ./goblob/security/
